<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="manifest" href="./site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto – Mar de Hilo</title>
  <meta name="description" content="Ponte en contacto con Mar de Hilo. Estamos en Isla Mujeres, México.">
  <link rel="canonical" href="https://mardehilo.com/contacto.html">
  <link rel="alternate" hreflang="es" href="https://mardehilo.com/contacto.html?lang=es">
  <link rel="alternate" hreflang="en" href="https://mardehilo.com/contacto.html?lang=en">
  <link rel="stylesheet" href="./css/estilo.css">
</head>
<body>
  <div id="header"></div>

  <main class="container section-padding">
    <h1 data-i18n="contacto.titulo">Contacto</h1>
    <p data-i18n="contacto.sub">¿Tienes alguna pregunta? Escríbenos</p>

    <div class="two-col-grid">
      <div>
        <form>
          <div class="mb-15">
            <label data-i18n="contacto.nombre">Nombre</label><br>
            <input type="text" name="nombre" class="form-control">
          </div>
          <div class="mb-15">
            <label data-i18n="contacto.email">Correo electrónico</label><br>
            <input type="email" name="email" class="form-control">
          </div>
          <div class="mb-15">
            <label data-i18n="contacto.mensaje">Mensaje</label><br>
            <textarea name="mensaje" rows="5" class="form-control"></textarea>
          </div>
          <button type="submit" class="btn" data-i18n="contacto.enviar">Enviar mensaje</button>
        </form>
      </div>
      <div>
        <h3 data-i18n="contacto.whatsapp">Escríbenos por WhatsApp</h3>
        <p><a href="https://wa.me/529981234567" target="_blank" class="btn btn-whatsapp">WhatsApp</a></p>
        <p><strong data-i18n="contacto.emailLabel">Correo electrónico:</strong> hola@mardehilo.com</p>
        <p><strong data-i18n="contacto.direccionLabel">Dirección:</strong> Isla Mujeres, Quintana Roo, México</p>
      </div>
    </div>
  </main>

  <div id="footer"></div>
  <script src="./js/i18n.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
